<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>

<title>Bookmarks - Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  /* Default Dark Theme */
  --brand: #0c84f3;
  --brand-dark: #0066d9;
  --brand-light: #53b5ff;
  --brand-soft: rgba(12,132,243,0.12);
  --brand-glow: rgba(12,132,243,0.2);
  
  --bg: #07111f;
  --bg-2: #0b1628;
  --surface: rgba(255,255,255,0.06);
  --surface-2: rgba(255,255,255,0.08);
  --surface-3: rgba(255,255,255,0.12);
  --surface-hover: rgba(255,255,255,0.1);
  
  --text: #f7fbff;
  --text-soft: rgba(247,251,255,0.78);
  --text-dim: rgba(247,251,255,0.56);
  
  --border: rgba(255,255,255,0.10);
  --border-strong: rgba(255,255,255,0.16);
  --shadow: 0 20px 60px rgba(0,0,0,0.35);
  
  --glass-bg: linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
  --glass-border: rgba(255,255,255,0.1);
  --noise-opacity: 0.06;
  
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
}

/* Light Theme Overrides */
[data-theme="light"] {
  --bg: #f8fafc;
  --bg-2: #ffffff;
  --surface: rgba(0,0,0,0.03);
  --surface-2: rgba(0,0,0,0.05);
  --surface-3: rgba(0,0,0,0.08);
  --surface-hover: rgba(0,0,0,0.05);
  
  --text: #0f172a;
  --text-soft: #475569;
  --text-dim: #94a3b8;
  
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.12);
  --shadow: 0 10px 40px rgba(0,0,0,0.05);
  
  --glass-bg: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
  --glass-border: rgba(0,0,0,0.08);
  --noise-opacity: 0.03;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }


body {
  min-height: 100vh;
  min-height: 100dvh;
  font-family: "Inter", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  transition: background 0.4s ease, color 0.4s ease;
  overflow-x: hidden;
}

/* --- NEW AMBIENT BACKGROUND --- */
.noise {
  position: fixed; inset: 0; pointer-events: none; opacity: var(--noise-opacity); z-index: 1;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.12) 0.6px, transparent 0.8px),
    radial-gradient(circle at 80% 40%, rgba(255,255,255,0.08) 0.6px, transparent 0.8px);
  background-size: 24px 24px, 36px 36px;
}

[data-theme="light"] .noise {
   background-image: radial-gradient(circle at 20% 20%, rgba(0,0,0,0.08) 0.6px, transparent 0.8px);
}

.bg-ambient {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}

/* Glowing Orbs */
.ambient-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.4;
  animation: floatOrb 20s ease-in-out infinite;
}

[data-theme="light"] .ambient-orb {
  opacity: 0.2;
  filter: blur(100px);
}

.orb-1 {
  width: 60vw;
  height: 60vw;
  max-width: 800px;
  max-height: 800px;
  background: radial-gradient(circle, var(--brand) 0%, transparent 70%);
  top: -20%;
  left: -10%;
  animation-delay: 0s;
}

.orb-2 {
  width: 50vw;
  height: 50vw;
  max-width: 600px;
  max-height: 600px;
  background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
  bottom: -10%;
  right: -10%;
  animation-delay: -7s;
  animation-duration: 25s;
}

.orb-3 {
  width: 40vw;
  height: 40vw;
  max-width: 500px;
  max-height: 500px;
  background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
  top: 40%;
  left: 40%;
  animation-delay: -14s;
  animation-duration: 30s;
}

@keyframes floatOrb {
  0% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(5%, 10%) scale(1.05); }
  50% { transform: translate(-5%, 5%) scale(0.95); }
  75% { transform: translate(10%, -5%) scale(1.02); }
  100% { transform: translate(0, 0) scale(1); }
}

/* Tracers */
.tracer {
  position: absolute;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  height: 1px;
  width: 200%;
  left: -50%;
  animation: driftTracer 15s linear infinite;
  transform-origin: center;
}

[data-theme="light"] .tracer {
  background: linear-gradient(90deg, transparent, rgba(0,0,0,0.05), transparent);
}

.tracer-1 { top: 20%; transform: rotate(-15deg); animation-delay: 0s; opacity: 0.6; }
.tracer-2 { top: 50%; transform: rotate(10deg); animation-delay: -5s; animation-duration: 20s; opacity: 0.4; }
.tracer-3 { top: 80%; transform: rotate(-5deg); animation-delay: -10s; animation-duration: 25s; opacity: 0.5; }
.tracer-4 { top: 35%; transform: rotate(25deg); animation-delay: -3s; animation-duration: 18s; opacity: 0.3; }

@keyframes driftTracer {
  0% { transform: translateX(-25%) rotate(inherit); }
  100% { transform: translateX(25%) rotate(inherit); }
}

/* --- END BACKGROUND --- */

/* Loader */
.loader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s ease, visibility 0.5s ease;
}

.loader.hidden { opacity: 0; visibility: hidden; }

.loader-ring {
  width: 36px;
  height: 36px;
  border: 2px solid var(--border);
  border-top-color: var(--brand);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Main Container */
.container {
  position: relative;
  z-index: 2;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px;
  min-height: 100vh;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  padding: 18px 0;
  margin-bottom: 32px;
  backdrop-filter: blur(14px); 
  -webkit-backdrop-filter: blur(14px);
  background: linear-gradient(to bottom, rgba(5,11,20,0.85), rgba(5,11,20,0.4), transparent);
  border-bottom: 1px solid transparent;
}

[data-theme="light"] .header {
   background: linear-gradient(to bottom, rgba(248,250,252,0.9), rgba(248,250,252,0.4), transparent);
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo-section {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: inherit;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--brand-light), var(--brand-dark));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  transition: transform 0.3s ease;
  box-shadow: 0 12px 30px rgba(12,132,243,0.24);
}

.logo-icon:hover { transform: rotate(-5deg) scale(1.05); }

.logo-icon svg { width: 20px; height: 20px; }

.logo-text {
  font-family: "Space Grotesk", sans-serif;
  font-size: 1.35rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--text);
}

.logo-text span { color: var(--brand-light); }

/* Clock */
.clock {
  text-align: right;
  font-family: "Space Grotesk", sans-serif;
  margin-right: 16px;
}

.clock-time {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--brand-light);
  letter-spacing: 0.02em;
  line-height: 1;
}

.clock-date {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 3px;
  font-weight: 400;
}

/* Theme Toggle */
.theme-toggle {
  position: relative;
  width: 52px;
  height: 28px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  overflow: hidden;
}

.theme-toggle:hover { border-color: var(--brand); }

.theme-toggle-knob {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 20px;
  height: 20px;
  background: linear-gradient(135deg, var(--brand-light), var(--brand-dark));
  border-radius: 50%;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  z-index: 2;
}

.theme-toggle-knob svg { width: 11px; height: 11px; color: white; }

[data-theme="light"] .theme-toggle-knob { transform: translateX(24px); }

.header-actions { display: flex; align-items: center; gap: 10px; }

/* Social Link */
.header-social-link {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 8px;
  color: var(--text-soft);
  transition: all 0.3s ease;
  text-decoration: none;
}

.header-social-link:hover { background: var(--surface); color: var(--text); }
.header-social-link svg { width: 18px; height: 18px; }

/* Search Section */
.search-section { margin-bottom: 28px; }

.search-row {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
}

.search-wrapper {
  position: relative;
  flex: 1;
  display: flex;
  align-items: center;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 0 16px;
  transition: all 0.3s ease;
  box-shadow: var(--shadow);
  backdrop-filter: blur(20px); 
  -webkit-backdrop-filter: blur(20px);
}

.search-wrapper:focus-within {
  border-color: rgba(83,181,255,0.4);
  box-shadow: 0 0 0 3px var(--brand-soft), var(--shadow);
}

.search-icon {
  width: 16px;
  height: 16px;
  color: var(--text-dim);
  flex-shrink: 0;
  transition: color 0.3s ease;
}

.search-wrapper:focus-within .search-icon { color: var(--brand-light); }

.search-input {
  flex: 1;
  background: none;
  border: none;
  padding: 14px 14px;
  font-size: 0.9rem;
  color: var(--text);
  outline: none;
  min-width: 0;
  font-family: inherit;
}

.search-input::placeholder { color: var(--text-dim); }

.search-stats {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 20px;
  background: var(--glass-bg);
  border-radius: var(--radius-lg);
  border: 1px solid var(--glass-border);
  box-shadow: var(--shadow);
  backdrop-filter: blur(20px);
}

.stat { text-align: center; }

.stat-num {
  font-family: "Space Grotesk", sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--brand-light);
  line-height: 1;
}

.stat-label {
  font-size: 0.65rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 3px;
  font-weight: 500;
}

/* Category Pills */
.categories {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.category-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50px;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-soft);
  cursor: pointer;
  transition: all 0.25s ease;
  white-space: nowrap;
  font-family: inherit;
  backdrop-filter: blur(10px);
}

.category-pill:hover {
  border-color: var(--border-strong);
  color: var(--text);
  background: var(--surface-2);
}

.category-pill.active {
  background: linear-gradient(135deg, var(--brand), var(--brand-dark));
  border-color: transparent;
  color: white;
  font-weight: 600;
  box-shadow: 0 4px 12px var(--brand-glow);
}

.category-pill .count {
  background: rgba(0,0,0,0.15);
  padding: 2px 7px;
  border-radius: 50px;
  font-size: 0.65rem;
  font-weight: 600;
}

.category-pill:not(.active) .count {
  background: var(--brand-soft);
  color: var(--brand-light);
}

/* Featured Section */
.featured-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 40px;
}

.featured-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius-md);
  padding: 20px 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  color: inherit;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.featured-card:hover {
  border-color: rgba(83,181,255,0.4);
  transform: translateY(-3px);
}

/* Large Featured Card (Creators) - Same Color, Different Animation */
.featured-card.large {
  grid-column: span 2;
  grid-row: span 2;
  padding: 30px;
  /* Same base color as others */
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
}

.featured-card.large:hover {
  /* Different animation: scale up and glow instead of just moving up */
  transform: scale(1.02);
  box-shadow: 0 20px 50px rgba(12, 132, 243, 0.2);
  border-color: var(--brand-light);
  z-index: 2;
}

.featured-card.large .featured-icon {
  width: 60px;
  height: 60px;
  margin-bottom: 16px;
}

.featured-card.large .featured-icon svg {
  width: 28px;
  height: 28px;
}

.featured-card.large .featured-title {
  font-size: 1.2rem;
  margin-bottom: 8px;
}

.featured-card.large .featured-desc {
  font-size: 0.8rem;
  max-width: 80%;
}

.featured-icon {
  width: 40px;
  height: 40px;
  margin: 0 auto 12px;
  background: linear-gradient(135deg, var(--brand-light), var(--brand-dark));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  transition: transform 0.3s ease;
  box-shadow: 0 8px 20px rgba(12,132,243,0.2);
}

.featured-card:hover .featured-icon { transform: scale(1.1) rotate(-5deg); }
.featured-icon svg { width: 18px; height: 18px; }

.featured-title {
  font-family: "Space Grotesk", sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 3px;
}

.featured-desc { font-size: 0.65rem; color: var(--text-dim); }

/* Bookmarks Grid */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  gap: 16px;
}

.section-title {
  font-family: "Space Grotesk", sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-title::after {
  content: "";
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, var(--border), transparent);
  min-width: 40px;
}

.bookmarks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
  width: 100%;
}

/* Bookmark Card */
.bookmark-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius-md);
  padding: 18px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
  position: relative;
  box-shadow: var(--shadow);
}

.bookmark-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--brand-light), var(--brand-dark));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.bookmark-card:hover {
  border-color: rgba(83,181,255,0.4);
  transform: translateY(-3px);
}

.bookmark-card:hover::before { transform: scaleX(1); }

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
}

.card-title {
  font-family: "Space Grotesk", sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  transition: color 0.2s ease;
}

.bookmark-card:hover .card-title { color: var(--brand-light); }

.card-arrow {
  width: 16px;
  height: 16px;
  color: var(--text-dim);
  transition: all 0.3s ease;
  flex-shrink: 0;
  margin-top: 2px;
  opacity: 0;
  transform: translate(-4px, 4px);
}

.bookmark-card:hover .card-arrow {
  transform: translate(2px, -2px);
  color: var(--brand-light);
  opacity: 1;
}

.card-desc {
  font-size: 0.8rem;
  color: var(--text-soft);
  line-height: 1.6;
  margin-bottom: 14px;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}

.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  margin-top: auto;
  gap: 10px;
}

.card-category {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.65rem;
  font-weight: 500;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.card-category::before {
  content: "";
  width: 5px;
  height: 5px;
  background: var(--brand-light);
  border-radius: 50%;
  flex-shrink: 0;
}

.card-domain {
  font-size: 0.7rem;
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-align: right;
  flex-shrink: 1;
  max-width: 50%;
  transition: color 0.2s ease;
}

.bookmark-card:hover .card-domain { color: var(--text-soft); }

/* Empty State */
.empty-state {
  text-align: center;
  padding: 60px 20px;
}

.empty-icon {
  width: 64px;
  height: 64px;
  margin: 0 auto 20px;
  background: var(--surface);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  border: 1px solid var(--border);
}

.empty-text {
  font-size: 1rem;
  color: var(--text-secondary);
  margin-bottom: 6px;
  font-weight: 500;
}

.empty-query {
  color: var(--brand-light);
  font-weight: 600;
  font-family: "Space Grotesk", sans-serif;
}

/* Show More Button */
.show-more-wrapper {
  display: flex;
  justify-content: center;
  padding: 20px 0;
}

.show-more-btn {
  padding: 14px 32px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50px;
  font-family: "Space Grotesk", sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-soft);
  cursor: pointer;
  transition: all 0.3s ease;
}

.show-more-btn:hover {
  border-color: var(--brand);
  color: var(--brand-light);
  background: var(--brand-soft);
  transform: translateY(-2px);
}

/* Footer */
.footer {
  border-top: 1px solid var(--border);
  padding: 42px 0;
  margin-top: 60px;
}

.footer-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 20px;
}

.footer-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text-soft);
  font-size: 0.9rem;
}

.footer-logo {
  width: 34px;
  height: 34px;
  background: linear-gradient(135deg, var(--brand-light), var(--brand-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  box-shadow: 0 8px 20px rgba(12,132,243,0.2);
}

.footer-logo svg { width: 14px; height: 14px; }

  border: none;
  padding: 8px;

.hamburger-btn:hover { color: var(--brand-light); background: var(--surface); }

.hamburger-btn svg { width: 20px; height: 20px; }

  padding: 20px;

  z-index: 100;
  opacity: 0;
  visibility: hidden;

  max-width: 320px;
  width: 100%;
}

.hamburger-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }

.hamburger-menu-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.3);
  z-index: 99;
  opacity: 0;
  visibility: hidden;

.hamburger-header {

.hamburger-close {

  display: flex;
  align-items: center;
  justify-content: center;

  color: var(--text-soft);

.hamburger-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }

.hamburger-item {

  'users': '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>'
};

function updateClock() {
  const now = new Date();
  document.getElementById('clock-time').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
  document.getElementById('clock-date').textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}
setInterval(updateClock, 1000);
updateClock();

function initTheme() {
  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  
  const knob = themeToggle.querySelector('svg');
  
  function updateIcon(theme) {
    if (theme === 'dark') {
      knob.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    } else {
      knob.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    }
  }

  updateIcon(savedTheme);

  themeToggle.addEventListener('click', () => {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    updateIcon(newTheme);
  });
  
  themeToggle.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      themeToggle.click();
    }
  });
}

function getDomain(url) {
  try {
    return new URL(url).hostname.replace('www.', '');
  } catch (e) {
    return 'link';
  }
}

function createCard(item, index) {
  const card = document.createElement('a');
  card.className = 'bookmark-card';
  card.href = item.link || '#';
  card.target = '_blank';
  card.rel = 'noopener noreferrer';
  card.style.animationDelay = `${Math.min(index, 8) * 0.03}s`;
  
  card.innerHTML = `
    <div class="card-top">
      <div class="card-title">${item.name}</div>
      <svg class="card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="7" y1="17" x2="17" y2="7"/>
        <polyline points="7 7 17 7 17 17"/>
      </svg>
    </div>
    <div class="card-desc">${item.desc || ''}</div>
    <div class="card-meta">
      <span class="card-category">${item.cat}</span>
      <span class="card-domain">${getDomain(item.link)}</span>
    </div>
  `;
  
  return card;
}

function renderFeatured() {
  featuredSection.innerHTML = '';
  
  if (activeCategories.size > 0 || searchQuery || showAll) {
    return;
  }
  
  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = '<div class="section-title">Featured</div>';
  featuredSection.appendChild(header);
  
  const grid = document.createElement('div');
  grid.className = 'featured-grid';
  
  featuredData.forEach((item, i) => {
    const card = document.createElement('a');
    card.className = 'featured-card';
    if (item.size === 'large') {
        card.classList.add('large');
    }
    
    card.href = item.link;
    card.target = item.link.startsWith('http') ? '_blank' : '_self';
    card.rel = 'noopener noreferrer';
    card.style.animationDelay = `${i * 0.04}s`;
    
    card.innerHTML = `
      <div class="featured-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          ${icons[item.icon] || ''}
        </svg>
      </div>
      <div class="featured-title">${item.name}</div>
      <div class="featured-desc">${item.desc}</div>
    `;
    
    grid.appendChild(card);
  });
  
  featuredSection.appendChild(grid);
}

function render() {
  const filtered = data.filter(item => {
    const matchCat = activeCategories.size === 0 || activeCategories.has(item.cat);
    const searchStr = `${item.name} ${item.cat} ${item.desc || ''}`.toLowerCase();
    const matchSearch = searchStr.includes(searchQuery.toLowerCase());
    return matchCat && matchSearch;
  });
  
  visibleCount.textContent = filtered.length;
  totalCount.textContent = data.length;
  
  renderFeatured();
  
  if (filtered.length === 0) {
    mainContent.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
        </div>
        <div class="empty-text">No results for <span class="empty-query">"${searchQuery}"</span></div>
      </div>
    `;
    return;
  }
  
  const limit = 12;
  const displayItems = showAll ? filtered : filtered.slice(0, limit);
  const hasMore = filtered.length > limit && !showAll;
  
  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = '<div class="section-title">Bookmarks</div>';
  mainContent.innerHTML = '';
  mainContent.appendChild(header);
  
  const grid = document.createElement('div');
  grid.className = 'bookmarks-grid';
  
  displayItems.forEach((item, i) => {
    grid.appendChild(createCard(item, i));
  });
  
  mainContent.appendChild(grid);
  
  if (hasMore) {
    const wrapper = document.createElement('div');
    wrapper.className = 'show-more-wrapper';
    
    const btn = document.createElement('button');
    btn.className = 'show-more-btn';
    btn.textContent = `Show ${filtered.length - limit} more`;
    btn.onclick = () => {
      showAll = true;
      render();
    };
    
    wrapper.appendChild(btn);
    mainContent.appendChild(wrapper);
  }
}

function initCategories() {
  const counts = {};
  data.forEach(item => {
    counts[item.cat] = (counts[item.cat] || 0) + 1;
  });
  
  const allBtn = document.createElement('button');
  allBtn.className = 'category-pill active';
  allBtn.textContent = 'All';
  allBtn.dataset.cat = 'all';
  categoriesContainer.appendChild(allBtn);
  
  Object.keys(counts).sort().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'category-pill';
    btn.dataset.cat = cat;
    btn.innerHTML = `${cat} <span class="count">${counts[cat]}</span>`;
    categoriesContainer.appendChild(btn);
  });
  
  categoriesContainer.addEventListener('click', (e) => {
    const btn = e.target.closest('.category-pill');
    if (!btn) return;
    
    const cat = btn.dataset.cat;
    
    if (cat === 'all') {
      activeCategories.clear();
    } else {
      if (activeCategories.has(cat)) {
        activeCategories.delete(cat);
      } else {
        activeCategories.add(cat);
      }
    }
    
    categoriesContainer.querySelectorAll('.category-pill').forEach(b => {
      const isActive = (b.dataset.cat === 'all' && activeCategories.size === 0) || 
                       activeCategories.has(b.dataset.cat);
      b.classList.toggle('active', isActive);
    });
    
    showAll = false;
    render();
  });
}

let searchTimeout = null;
searchInput.addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    searchQuery = e.target.value.trim();
    showAll = false;
    render();
  }, 200);
});

document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape') {
    searchInput.blur();
    searchInput.value = '';
    searchQuery = '';
    showAll = false;
    render();
    hideHamburgerMenu();
  }
});

function showHamburgerMenu() {
  hamburgerMenu.classList.add('show');
  hamburgerOverlay.classList.add('show');
}

function hideHamburgerMenu() {
  hamburgerMenu.classList.remove('show');
  hamburgerOverlay.classList.remove('show');
}

hamburgerBtn.addEventListener('click', showHamburgerMenu);
hamburgerClose.addEventListener('click', hideHamburgerMenu);
hamburgerOverlay.addEventListener('click', hideHamburgerMenu);

function init() {
  initTheme();
  
  const waitForData = () => {
    if (window.BOOKMARKS_DATA && window.BOOKMARKS_DATA.length > 0) {
      console.log('Data loaded:', window.BOOKMARKS_DATA.length, 'items');
      initCategories();
      render();
      
      setTimeout(() => {
        loader.classList.add('hidden');
      }, 300);
    } else {
      console.log('Waiting for data...');
      setTimeout(waitForData, 100);
    }
  };
  
  waitForData();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

</body>
</html>
